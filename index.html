<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ことのはROM</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

#video{
width:100%;
max-height:40vh;
background:black;
object-fit:cover;
}

#canvas{
flex:1;
width:100%;
touch-action:none;
background:black;
}

#angle{
text-align:center;
font-size:28px;
padding:10px;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
background:#222;
}

button,label{
padding:12px 16px;
font-size:16px;
border:none;
border-radius:10px;
background:#3a3a3a;
color:white;
}

input[type=file]{
display:none;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="angle">角度:-</div>

<div class="controls">

<button onclick="takePhoto()">撮影</button>

<label>
写真読み込み
<input type="file" accept="image/*" onchange="loadImage(event)">
</label>

<button onclick="resetPoints()">リセット</button>

</div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let image=null
let points=[]
let dragging=null
let currentAngle=null
let lastVoiceTime=0

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{ideal:"environment"}
}
})

video.srcObject=stream

}

startCamera()

function takePhoto(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

image=ctx.getImageData(0,0,canvas.width,canvas.height)

points=[]
draw()

}

function loadImage(e){

const file=e.target.files[0]
if(!file)return

const img=new Image()

img.onload=function(){

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

image=ctx.getImageData(0,0,canvas.width,canvas.height)

points=[]
draw()

}

img.src=URL.createObjectURL(file)

}

canvas.addEventListener("click",function(e){

if(!image)return

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left)*(canvas.width/rect.width)
const y=(e.clientY-rect.top)*(canvas.height/rect.height)

if(points.length<3){

points.push({x,y})

}

draw()

})

canvas.addEventListener("mousedown",function(e){

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left)*(canvas.width/rect.width)
const y=(e.clientY-rect.top)*(canvas.height/rect.height)

points.forEach((p,i)=>{

if(Math.hypot(p.x-x,p.y-y)<20){

dragging=i

}

})

})

canvas.addEventListener("mousemove",function(e){

if(dragging===null)return

const rect=canvas.getBoundingClientRect()

points[dragging].x=(e.clientX-rect.left)*(canvas.width/rect.width)
points[dragging].y=(e.clientY-rect.top)*(canvas.height/rect.height)

draw()

})

canvas.addEventListener("mouseup",()=>dragging=null)

function draw(){

if(image)ctx.putImageData(image,0,0)

points.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,8,0,Math.PI*2)
ctx.fillStyle="yellow"
ctx.fill()

})

if(points.length===3){

ctx.strokeStyle="red"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(points[0].x,points[0].y)
ctx.lineTo(points[1].x,points[1].y)
ctx.lineTo(points[2].x,points[2].y)
ctx.stroke()

const angle=calcAngle(points[0],points[1],points[2])

currentAngle=angle

document.getElementById("angle").innerText=
"角度:"+angle.toFixed(1)+"°"

}

}

function calcAngle(a,b,c){

const ab=[a.x-b.x,a.y-b.y]
const cb=[c.x-b.x,c.y-b.y]

const dot=ab[0]*cb[0]+ab[1]*cb[1]

const mag1=Math.hypot(ab[0],ab[1])
const mag2=Math.hypot(cb[0],cb[1])

let angle=Math.acos(dot/(mag1*mag2))

return angle*180/Math.PI

}

document.getElementById("angle").onclick=function(){

if(currentAngle==null)return

currentAngle=180-currentAngle

document.getElementById("angle").innerText=
"角度:"+currentAngle.toFixed(1)+"°"

}

function resetPoints(){

points=[]
draw()

document.getElementById("angle").innerText="角度:-"

}

let lastTap=0

canvas.addEventListener("touchend",function(){

let now=Date.now()

if(now-lastTap<300){

takePhoto()

}

lastTap=now

})

if("webkitSpeechRecognition" in window){

const rec=new webkitSpeechRecognition()

rec.lang="ja-JP"
rec.continuous=true

rec.onresult=function(e){

const text=e.results[e.results.length-1][0].transcript

if(
(text.includes("シャッター")||
text.includes("写真")||
text.includes("撮影"))
&& Date.now()-lastVoiceTime>1000
){

lastVoiceTime=Date.now()

takePhoto()

}

}

rec.start()

}

</script>
</body>
</html>
