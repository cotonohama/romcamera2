<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ことのは ROMカメラ 安定版</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<style>
    body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #container { position: relative; flex: 1; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
    video { position: absolute; width: 100%; height: 100%; object-fit: contain; }
    canvas#output_canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
    #overlay { position: absolute; top: 15px; left: 15px; text-align: left; pointer-events: none; text-shadow: 2px 2px 3px #000; z-index: 10; }
    #info-panel { padding: 15px; background: #222; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
    .display-row { display: flex; justify-content: space-around; font-size: 14px; }
    .angle-val { color: #00ff00; font-weight: bold; font-size: 22px; }
    .btn-group { display: flex; gap: 10px; }
    button { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
    #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-blue { background: #2c7be5; color: white; }
    .btn-red { background: #d63031; color: white; }
    #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 1001; }
</style>
</head>
<body>

<div id="start-overlay">
    <h2 style="margin-bottom:20px;">ことのは ROMカメラ</h2>
    <button class="btn-blue" onclick="initApp()" style="max-width: 280px;">カメラ・音声を起動する</button>
    <p style="font-size: 14px; margin-top: 20px; color: #aaa;">タップして計測を開始してください</p>
</div>

<div id="flash"></div>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="overlay">
        肘: <span class="angle-val" id="ai_elbow">--</span>°<br>
        膝: <span class="angle-val" id="ai_knee">--</span>°<br>
        手動: <span class="angle-val" id="manual-angle">--</span>°
    </div>
</div>

<div id="info-panel">
    <div class="display-row">
        <span id="mic-status">🎤 音声: 待機中</span>
        <span id="stable-msg" style="color:#f1c40f;">3秒静止で撮影</span>
    </div>
    <div class="btn-group">
        <button class="btn-blue" onclick="takePhoto('手動')">📸 撮影</button>
        <button class="btn-red" onclick="resetManual()">🔄 リセット</button>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const aiNodes = { elbow: document.getElementById('ai_elbow'), knee: document.getElementById('ai_knee') };
const manualDisplay = document.getElementById('manual-angle');
const micStatus = document.getElementById('mic-status');
const stableMsg = document.getElementById('stable-msg');
const flash = document.getElementById('flash');

let manualPoints = [];
let lastAngle = 0;
let stableCounter = 0;

// アプリ起動
async function initApp() {
    document.getElementById('start-overlay').style.display = 'none';
    
    // 画面消灯防止
    if ('wakeLock' in navigator) {
        try { await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    // カメラと音声の開始
    startVoice();
    
    // カメラ設定を確実にする
    const camera = new Camera(videoElement, {
        onFrame: async () => { await pose.send({image: videoElement}); },
        width: 1280, height: 720 // 高解像度化
    });
    
    try {
        await camera.start();
        console.log("Camera started");
    } catch (e) {
        alert("カメラの起動に失敗しました。ブラウザの設定で許可してください。");
    }
}

function takePhoto(label) {
    flash.style.opacity = "1";
    setTimeout(() => { flash.style.opacity = "0"; }, 100);
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = videoElement.videoWidth;
    tempCanvas.height = videoElement.videoHeight;
    const ctx = tempCanvas.getContext('2d');
    
    // 映像を左右反転させずに描画
    ctx.drawImage(videoElement, 0, 0);
    ctx.drawImage(canvasElement, 0, 0);
    
    const link = document.createElement('a');
    link.href = tempCanvas.toDataURL('image/png');
    link.download = `Kotonoha_${new Date().getTime()}.png`;
    link.click();
}
