<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ことのは ROMカメラ 安定版 v2</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<style>
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; }
    body { font-family: sans-serif; display: flex; flex-direction: column; }
    #header { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; z-index: 20; }
    #container { position: relative; flex: 1; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
    video, #captured_image { position: absolute; width: 100%; height: 100%; object-fit: contain; }
    canvas#output_canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 5; pointer-events: auto; }
    #overlay-val { position: absolute; top: 10px; left: 10px; text-shadow: 2px 2px 2px #000; z-index: 10; font-size: 20px; color: #00ff00; font-weight: bold; pointer-events: none; }
    #info-panel { background: #222; padding: 15px 10px 30px 10px; border-top: 1px solid #444; z-index: 20; }
    .btn-group { display: flex; gap: 10px; max-width: 500px; margin: 0 auto; }
    button { flex: 1; padding: 18px 5px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
    .btn-blue { background: #2c7be5; } .btn-red { background: #d63031; } .btn-green { background: #27ae60; }
    #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 1001; }
</style>
</head>
<body>

<div id="start-overlay">
    <h2>ことのは ROMカメラ</h2>
    <button class="btn-blue" onclick="initApp()" style="max-width: 250px; padding: 20px;">アプリを起動する</button>
</div>

<div id="flash"></div>

<div id="header">
    <select id="camera-select" onchange="switchCamera(this.value)" style="background:#444; color:white; padding:8px; border-radius:5px;">
        <option value="environment">背面カメラ</option>
        <option value="user">前面カメラ</option>
    </select>
    <label class="btn-green" style="padding: 8px 12px; border-radius: 5px; font-size: 14px; cursor: pointer;">
        📂 写真読込
        <input type="file" accept="image/*" onchange="loadLocalImage(event)" style="display:none;">
    </label>
</div>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <img id="captured_image" style="display:none;">
    <canvas id="output_canvas"></canvas>
    <div id="overlay-val">角度: <span id="manual-angle">--</span>°</div>
</div>

<div id="info-panel">
    <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 12px; color: #ccc;">
        <span id="mic-status">🎤 音声: 待機中</span>
        <span id="guide-msg">3点タップ計測 / Wタップ撮影</span>
    </div>
    <div class="btn-group">
        <button class="btn-blue" onclick="takePhoto()">📸 撮影</button>
        <button class="btn-red" onclick="resetManual()">🔄 リセット</button>
        <button id="mode-btn" class="btn-green" style="display:none;" onclick="toggleCamera()">📷 戻る</button>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const imageElement = document.getElementById('captured_image');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const manualDisplay = document.getElementById('manual-angle');
const micStatus = document.getElementById('mic-status');
const guideMsg = document.getElementById('guide-msg');
const flash = document.getElementById('flash');

let manualPoints = [];
let trackedIndices = [];
let cameraObj = null;
let currentFacingMode = "environment";
let isImageMode = false;
let currentPoseResults = null;
let lastClickTime = 0;

async function initApp() {
    document.getElementById('start-overlay').style.display = 'none';
    startVoice();
    startCamera(currentFacingMode);
}

function startCamera(mode) {
    isImageMode = false;
    videoElement.style.display = "block";
    imageElement.style.display = "none";
    document.getElementById('mode-btn').style.display = "none";
    if(cameraObj) { cameraObj.stop(); }
    cameraObj = new Camera(videoElement, {
        onFrame: async () => { if(!isImageMode) await pose.send({image: videoElement}); },
        width: 1280, height: 720, facingMode: mode
    });
    cameraObj.start();
}

function toggleCamera() { startCamera(currentFacingMode); resetManual(); }
function switchCamera(mode) { currentFacingMode = mode; startCamera(mode); }

function loadLocalImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    isImageMode = true;
    if(cameraObj) cameraObj.stop();
    const reader = new FileReader();
    reader.onload = (event) => {
        imageElement.src = event.target.result;
        imageElement.style.display = "block";
        videoElement.style.display = "none";
        document.getElementById('mode-btn').style.display = "block";
        imageElement.onload = async () => {
            canvasElement.width = imageElement.naturalWidth;
            canvasElement.height = imageElement.naturalHeight;
            await pose.send({image: imageElement});
            resetManual();
        };
    };
    reader.readAsDataURL(file);
}

function takePhoto() {
    flash.style.opacity = "1";
    setTimeout(() => { flash.style.opacity = "0"; }, 100);
    const tempCanvas = document.createElement('canvas');
    const source = isImageMode ? imageElement : videoElement;
    tempCanvas.width = source.videoWidth || source.naturalWidth;
    tempCanvas.height = source.videoHeight || source.naturalHeight;
    const ctx = tempCanvas.getContext('2d');
    ctx.drawImage(source, 0, 0);
    ctx.drawImage(canvasElement, 0, 0);
    const link = document.createElement('a');
    link.href = tempCanvas.toDataURL('image/jpeg', 0.6);
    link.download = `ROM_${new Date().getTime()}.jpg`;
    link.click();
}

function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP'; 
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.onstart = () => { micStatus.innerText = "🎤 音声認識中"; };
        recognition.onresult = (event) => {
            const text = event.results[event.results.length - 1][0].transcript;
            if (text.match(/シャッター|とって|はい/)) takePhoto();
        };
        recognition.onend = () => recognition.start(); // 途切れても自動再開
        recognition.start();
    }
}

function calculateAngle(A, B, C) {
    const BA = { x: A.x - B.x, y: A.y - B.y };
    const BC = { x: C.x - B.x, y: C.y - B.y };
    const dot = BA.x * BC.x + BA.y * BC.y;
    const magBA = Math.sqrt(BA.x * BA.x + BA.y * BA.y);
    const magBC = Math.sqrt(BC.x * BC.x + BC.y * BC.y);
    if(magBA === 0 || magBC === 0) return 0;
    return (Math.acos(dot / (magBA * magBC)) * 180 / Math.PI).toFixed(1);
}

// ズレ解消のための座標変換関数
function getCanvasCoords(e) {
    const rect = canvasElement.getBoundingClientRect();
    const scaleX = canvasElement.width / rect.width;
    const scaleY = canvasElement.height / rect.height;
    const clientX = e.clientX || e.touches[0].clientX;
    const clientY = e.clientY || e.touches[0].clientY;
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

canvasElement.addEventListener("click", (e) => {
    const now = Date.now();
    if (now - lastClickTime < 300) { // ダブルタップ判定
        takePhoto();
        lastClickTime = 0;
        return;
    }
    lastClickTime = now;

    const coords = getCanvasCoords(e);
    if (manualPoints.length < 3) {
        // 吸着ロジック
        let nearestIdx = -1;
        let minDist = 60;
        if(currentPoseResults && currentPoseResults.poseLandmarks) {
            currentPoseResults.poseLandmarks.forEach((lm, i) => {
                const dist = Math.hypot(coords.x - lm.x * canvasElement.width, coords.y - lm.y * canvasElement.height);
                if(dist < minDist) { minDist = dist; nearestIdx = i; }
            });
        }
        manualPoints.push(coords);
        trackedIndices.push(nearestIdx);
        drawManual();
        updateDisplay();
    }
});

function updateDisplay() {
    if (manualPoints.length === 3) {
        manualDisplay.innerText = calculateAngle(manualPoints[0], manualPoints[1], manualPoints[2]);
        guideMsg.innerText = "計測完了";
    } else {
        guideMsg.innerText = (manualPoints.length + 1) + "点目をタップ";
    }
}

function drawManual() {
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    manualPoints.forEach((p, i) => {
        canvasCtx.fillStyle = "red";
        canvasCtx.beginPath(); canvasCtx.arc(p.x, p.y, 15, 0, Math.PI * 2); canvasCtx.fill();
        canvasCtx.strokeStyle = "white"; canvasCtx.lineWidth = 4; canvasCtx.stroke();
    });
    if(manualPoints.length >= 2) {
        canvasCtx.strokeStyle = "red"; canvasCtx.lineWidth = 6;
        canvasCtx.beginPath(); canvasCtx.moveTo(manualPoints[0].x, manualPoints[0].y);
        canvasCtx.lineTo(manualPoints[1].x, manualPoints[1].y);
        if(manualPoints.length === 3) canvasCtx.lineTo(manualPoints[2].x, manualPoints[2].y);
        canvasCtx.stroke();
    }
}

function resetManual() { manualPoints = []; trackedIndices = []; manualDisplay.innerText = "--"; guideMsg.innerText = "3点タップ計測 / Wタップ撮影"; drawManual(); }

function onResults(results) {
    currentPoseResults = results;
    if(!isImageMode) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        // 追随（トラッキング）ロジック
        if (results.poseLandmarks) {
            trackedIndices.forEach((idx, i) => {
                if(idx !== -1) {
                    manualPoints[i].x = results.poseLandmarks[idx].x * canvasElement.width;
                    manualPoints[i].y = results.poseLandmarks[idx].y * canvasElement.height;
                }
            });
            if(manualPoints.length === 3) updateDisplay();
        }
    }
    drawManual();
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
pose.onResults(onResults);
</script>
</body>
</html>
