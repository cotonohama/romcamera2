<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ことのはROM</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

video,canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

#angle{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:28px;
background:rgba(0,0,0,0.5);
padding:8px 18px;
border-radius:20px;
}

.controls{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

button,label{
padding:10px 14px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

#gallery{
position:absolute;
bottom:0;
width:100%;
height:70px;
background:#111;
display:flex;
overflow-x:auto;
gap:5px;
padding:5px;
}

.thumb{
height:60px;
border-radius:6px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="angle">角度:-</div>

<div class="controls">

<button onclick="takePhoto()">撮影</button>

<button onclick="switchCamera()">カメラ切替</button>

<button onclick="startVoice()">音声</button>

<label>
写真
<input type="file" accept="image/*" onchange="loadImage(event)" hidden>
</label>

<button onclick="resetAction()">戻る</button>

</div>

<div id="gallery"></div>

<script>

const video=document.querySelector("video")
const canvas=document.querySelector("canvas")
const ctx=canvas.getContext("2d")

let facing="environment"
let stream=null

let image=null
let points=[]
let dragging=null
let currentAngle=null

let photos=[]

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing}
})

video.srcObject=stream

}

startCamera()

function switchCamera(){

facing=facing==="environment"?"user":"environment"

startCamera()

}

function takePhoto(){

const temp=document.createElement("canvas")
const tctx=temp.getContext("2d")

temp.width=video.videoWidth
temp.height=video.videoHeight

tctx.drawImage(video,0,0)

let data=temp.toDataURL("image/jpeg",0.8)

savePhoto(data)

}

function savePhoto(data){

photos.push(data)

const img=document.createElement("img")
img.src=data
img.className="thumb"

img.onclick=function(){
loadPhoto(data)
}

document.getElementById("gallery").prepend(img)

}

function loadPhoto(data){

const img=new Image()

img.onload=function(){

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

image=ctx.getImageData(0,0,canvas.width,canvas.height)

points=[]

}

img.src=data

}

function loadImage(e){

const file=e.target.files[0]

const img=new Image()

img.onload=function(){

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

image=ctx.getImageData(0,0,canvas.width,canvas.height)

points=[]

}

img.src=URL.createObjectURL(file)

}

canvas.addEventListener("click",function(e){

if(!image)return

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left)*(canvas.width/rect.width)
const y=(e.clientY-rect.top)*(canvas.height/rect.height)

if(points.length<3){
points.push({x,y})
}

draw()

})

function draw(){

if(image)ctx.putImageData(image,0,0)

points.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,8,0,Math.PI*2)
ctx.fillStyle="yellow"
ctx.fill()
})

if(points.length===3){

ctx.strokeStyle="red"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(points[0].x,points[0].y)
ctx.lineTo(points[1].x,points[1].y)
ctx.lineTo(points[2].x,points[2].y)
ctx.stroke()

const angle=calcAngle(points[0],points[1],points[2])

currentAngle=angle

document.getElementById("angle").innerText="角度:"+angle.toFixed(1)+"°"

}

}

function calcAngle(a,b,c){

const ab=[a.x-b.x,a.y-b.y]
const cb=[c.x-b.x,c.y-b.y]

const dot=ab[0]*cb[0]+ab[1]*cb[1]

const mag1=Math.hypot(ab[0],ab[1])
const mag2=Math.hypot(cb[0],cb[1])

let angle=Math.acos(dot/(mag1*mag2))

return angle*180/Math.PI

}

function resetAction(){

if(points.length>0){

points.pop()
draw()

return

}

image=null

ctx.clearRect(0,0,canvas.width,canvas.height)

document.getElementById("angle").innerText="角度:-"

}

let pressTimer

canvas.addEventListener("touchstart",function(){

pressTimer=setTimeout(()=>{
takePhoto()
},600)

})

canvas.addEventListener("touchend",function(){

clearTimeout(pressTimer)

})

function startVoice(){

if(!("webkitSpeechRecognition" in window)){
alert("音声認識未対応")
return
}

const rec=new webkitSpeechRecognition()

rec.lang="ja-JP"
rec.continuous=true

rec.onresult=function(e){

const text=e.results[e.results.length-1][0].transcript

if(text.includes("シャッター")||
text.includes("写真")||
text.includes("撮影")){
takePhoto()
}

}

rec.start()

}

</script>

</body>
</html>
