<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ROM</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

#video,#canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

#angle{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:32px;
background:rgba(0,0,0,0.5);
padding:10px 20px;
border-radius:20px;
}

.controls{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

button,label{
padding:10px 15px;
border:none;
border-radius:10px;
font-size:14px;
background:#333;
color:white;
}

input{display:none;}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="angle">角度:-</div>

<div class="controls">

<button onclick="takePhoto()">撮影</button>

<button onclick="switchCamera()">カメラ切替</button>

<button onclick="startVoice()">音声ON</button>

<label>
写真
<input type="file" accept="image/*" onchange="loadImage(event)">
</label>

<button onclick="undoPoint()">戻す</button>

</div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let facing="environment"
let stream=null

let image=null
let points=[]
let dragging=null
let currentAngle=null

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing}
})

video.srcObject=stream

}

startCamera()

function switchCamera(){

facing=facing==="environment"?"user":"environment"

startCamera()

}

function takePhoto(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

image=ctx.getImageData(0,0,canvas.width,canvas.height)

points=[]
draw()

}

function loadImage(e){

const file=e.target.files[0]

if(!file)return

const img=new Image()

img.onload=function(){

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

image=ctx.getImageData(0,0,canvas.width,canvas.height)

points=[]
draw()

}

img.src=URL.createObjectURL(file)

}

canvas.addEventListener("click",function(e){

if(!image)return

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left)*(canvas.width/rect.width)
const y=(e.clientY-rect.top)*(canvas.height/rect.height)

if(points.length<3){
points.push({x,y})
}

draw()

})

canvas.addEventListener("mousedown",function(e){

const rect=canvas.getBoundingClientRect()

const x=(e.clientX-rect.left)*(canvas.width/rect.width)
const y=(e.clientY-rect.top)*(canvas.height/rect.height)

points.forEach((p,i)=>{

if(Math.hypot(p.x-x,p.y-y)<20){
dragging=i
}

})

})

canvas.addEventListener("mousemove",function(e){

if(dragging===null)return

const rect=canvas.getBoundingClientRect()

points[dragging].x=(e.clientX-rect.left)*(canvas.width/rect.width)
points[dragging].y=(e.clientY-rect.top)*(canvas.height/rect.height)

draw()

})

canvas.addEventListener("mouseup",()=>dragging=null)

function draw(){

if(image)ctx.putImageData(image,0,0)

points.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,8,0,Math.PI*2)
ctx.fillStyle="yellow"
ctx.fill()
})

if(points.length===3){

ctx.strokeStyle="red"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(points[0].x,points[0].y)
ctx.lineTo(points[1].x,points[1].y)
ctx.lineTo(points[2].x,points[2].y)
ctx.stroke()

const angle=calcAngle(points[0],points[1],points[2])

currentAngle=angle

document.getElementById("angle").innerText=
"角度:"+angle.toFixed(1)+"°"

}

}

function calcAngle(a,b,c){

const ab=[a.x-b.x,a.y-b.y]
const cb=[c.x-b.x,c.y-b.y]

const dot=ab[0]*cb[0]+ab[1]*cb[1]

const mag1=Math.hypot(ab[0],ab[1])
const mag2=Math.hypot(cb[0],cb[1])

let angle=Math.acos(dot/(mag1*mag2))

return angle*180/Math.PI

}

document.getElementById("angle").onclick=function(){

if(currentAngle==null)return

currentAngle=180-currentAngle

this.innerText="角度:"+currentAngle.toFixed(1)+"°"

}

function undoPoint(){

if(points.length>0){
points.pop()
draw()
}

if(points.length<3){
document.getElementById("angle").innerText="角度:-"
}

}

let pressTimer

canvas.addEventListener("touchstart",function(){

pressTimer=setTimeout(()=>{
takePhoto()
},600)

})

canvas.addEventListener("touchend",function(){

clearTimeout(pressTimer)

})

let recognition

function startVoice(){

if(!("webkitSpeechRecognition" in window)){

alert("音声認識未対応ブラウザ")

return

}

recognition=new webkitSpeechRecognition()

recognition.lang="ja-JP"
recognition.continuous=true

recognition.onresult=function(e){

const text=e.results[e.results.length-1][0].transcript

if(text.includes("シャッター")||
text.includes("撮影")||
text.includes("写真")){
takePhoto()
}

}

recognition.start()

alert("音声シャッターON")

}

</script>

</body>
</html>
