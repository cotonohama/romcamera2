<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ことのは ROM</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
}

#video{
width:100%;
max-height:50vh;
background:black;
}

#canvas{
width:100%;
touch-action:none;
}

.controls{
padding:10px;
}

button{
padding:12px;
margin:5px;
font-size:16px;
border-radius:10px;
border:none;
}

#angle{
font-size:32px;
margin:10px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="angle">角度: -</div>

<div class="controls">
<button onclick="takePhoto()">撮影</button>
<input type="file" accept="image/*" onchange="loadImage(event)">
<button onclick="resetPoints()">リセット</button>
</div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let image=null;
let points=[];
let dragging=null;

async function startCamera(){
const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
}
startCamera();

function takePhoto(){
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
ctx.drawImage(video,0,0);
image=ctx.getImageData(0,0,canvas.width,canvas.height);
points=[];
draw();
}

function loadImage(e){
const img=new Image();
img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
image=ctx.getImageData(0,0,canvas.width,canvas.height);
points=[];
draw();
};
img.src=URL.createObjectURL(e.target.files[0]);
}

canvas.addEventListener("click",e=>{
const rect=canvas.getBoundingClientRect();
const x=(e.clientX-rect.left)*(canvas.width/rect.width);
const y=(e.clientY-rect.top)*(canvas.height/rect.height);

if(points.length<3){
points.push({x,y});
draw();
}
});

canvas.addEventListener("mousedown",e=>{
const rect=canvas.getBoundingClientRect();
const x=(e.clientX-rect.left)*(canvas.width/rect.width);
const y=(e.clientY-rect.top)*(canvas.height/rect.height);

points.forEach((p,i)=>{
if(Math.hypot(p.x-x,p.y-y)<20){
dragging=i;
}
});
});

canvas.addEventListener("mousemove",e=>{
if(dragging===null)return;

const rect=canvas.getBoundingClientRect();
points[dragging].x=(e.clientX-rect.left)*(canvas.width/rect.width);
points[dragging].y=(e.clientY-rect.top)*(canvas.height/rect.height);

draw();
});

canvas.addEventListener("mouseup",()=>dragging=null);

function draw(){

if(image)ctx.putImageData(image,0,0);

ctx.lineWidth=4;
ctx.strokeStyle="red";

points.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,8,0,Math.PI*2);
ctx.fillStyle="yellow";
ctx.fill();
});

if(points.length==3){

ctx.beginPath();
ctx.moveTo(points[0].x,points[0].y);
ctx.lineTo(points[1].x,points[1].y);
ctx.lineTo(points[2].x,points[2].y);
ctx.stroke();

const angle=calcAngle(points[0],points[1],points[2]);
currentAngle=angle;

document.getElementById("angle").innerText="角度: "+angle.toFixed(1)+"°";

}

}

let currentAngle=null;

function calcAngle(a,b,c){

const ab=[a.x-b.x,a.y-b.y];
const cb=[c.x-b.x,c.y-b.y];

const dot=ab[0]*cb[0]+ab[1]*cb[1];

const mag1=Math.hypot(ab[0],ab[1]);
const mag2=Math.hypot(cb[0],cb[1]);

let angle=Math.acos(dot/(mag1*mag2));

return angle*180/Math.PI;

}

document.getElementById("angle").onclick=()=>{
if(currentAngle==null)return;

currentAngle=180-currentAngle;
document.getElementById("angle").innerText="角度: "+currentAngle.toFixed(1)+"°";
};

function resetPoints(){
points=[];
draw();
document.getElementById("angle").innerText="角度: -";
}

let lastTap=0;

canvas.addEventListener("touchend",function(e){
let currentTime=new Date().getTime();
let tapLength=currentTime-lastTap;

if(tapLength<300 && tapLength>0){
takePhoto();
}

lastTap=currentTime;
});

if('webkitSpeechRecognition' in window){

const recognition=new webkitSpeechRecognition();
recognition.lang="ja-JP";
recognition.continuous=true;

recognition.onresult=function(event){

const text=event.results[event.results.length-1][0].transcript;

if(text.includes("シャッター")||text.includes("撮影")||text.includes("写真")){
takePhoto();
}

};

recognition.start();

}

</script>
</body>
</html>
