<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ことのは ROM v10</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<style>

body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
overflow:hidden;
touch-action:none;
}

#container{
position:relative;
width:100vw;
height:75vh;
background:#000;
}

video,canvas{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
max-width:100%;
max-height:100%;
}

#overlay{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:12px;
border-radius:12px;
text-align:left;
z-index:100;
border:1px solid rgba(255,255,255,0.2);
min-width:160px;
cursor:move;
}

.angle-item{
font-size:18px;
margin-bottom:4px;
font-weight:bold;
}

.main-val{
color:#00ff00;
}

.hint{
font-size:9px;
color:#aaa;
margin-top:5px;
text-align:center;
}

.controls{
padding:10px;
background:#222;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{
font-size:16px;
padding:12px 18px;
border-radius:8px;
border:none;
font-weight:bold;
cursor:pointer;
}

.btn-save{
background:#2c7be5;
color:white;
}

.btn-sub{
background:#444;
color:white;
}

</style>

</head>

<body>

<div id="container">

<video id="video" autoplay playsinline muted></video> <canvas id="canvas"></canvas>

<div id="overlay">
<div id="angles-list"></div>
<div class="hint">タップ:角度反転 / 長押し:移動</div>
</div>

</div>

<div class="controls">

<button class="btn-save" onclick="takePhoto()">📸 保存</button> <button class="btn-sub" onclick="resetMax()">MAXリセット</button>

</div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const anglesList=document.getElementById("angles-list")
const overlay=document.getElementById("overlay")

let detector
let isFlipped=false
let maxAngles={}

let pressTimer
let isDragging=false
let offset={x:0,y:0}

overlay.addEventListener("touchstart",(e)=>{

const touch=e.touches[0]

pressTimer=setTimeout(()=>{

isDragging=true
overlay.style.borderColor="#2c7be5"

offset.x=touch.clientX-overlay.offsetLeft
offset.y=touch.clientY-overlay.offsetTop

},500)

},{passive:true})

document.addEventListener("touchmove",(e)=>{

if(!isDragging)return

const touch=e.touches[0]

overlay.style.left=(touch.clientX-offset.x)+"px"
overlay.style.top=(touch.clientY-offset.y)+"px"

},{passive:true})

overlay.addEventListener("touchend",()=>{

clearTimeout(pressTimer)

if(!isDragging){
isFlipped=!isFlipped
}

isDragging=false
overlay.style.borderColor="rgba(255,255,255,0.2)"

})

function calcAngle(A,B,C){

const AB={x:A.x-B.x,y:A.y-B.y}
const CB={x:C.x-B.x,y:C.y-B.y}

const dot=AB.x*CB.x+AB.y*CB.y

const magAB=Math.sqrt(AB.x*AB.x+AB.y*AB.y)
const magCB=Math.sqrt(CB.x*CB.x+CB.y*CB.y)

let ang=Math.acos(dot/(magAB*magCB))*180/Math.PI

return isFlipped?(180-ang):ang

}

async function detect(){

const poses=await detector.estimatePoses(video)

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let html=""

if(poses.length>0){

const k=poses[0].keypoints

const p=(name)=>k.find(x=>x.name===name && x.score>0.3)

const targets=[

{label:"右肩",pts:["right_elbow","right_shoulder","right_hip"]},
{label:"左肩",pts:["left_elbow","left_shoulder","left_hip"]},

{label:"右肘",pts:["right_shoulder","right_elbow","right_wrist"]},
{label:"左肘",pts:["left_shoulder","left_elbow","left_wrist"]},

{label:"右股関節",pts:["right_shoulder","right_hip","right_knee"]},
{label:"左股関節",pts:["left_shoulder","left_hip","left_knee"]},

{label:"右膝",pts:["right_hip","right_knee","right_ankle"]},
{label:"左膝",pts:["left_hip","left_knee","left_ankle"]}

]

targets.forEach(t=>{

const pts=t.pts.map(n=>p(n))

if(!pts.includes(undefined)){

const ang=calcAngle(pts[0],pts[1],pts[2])

if(!maxAngles[t.label]||ang>maxAngles[t.label]){
maxAngles[t.label]=ang
}

html+=`<div class="angle-item">${t.label}: <span class="main-val">${ang.toFixed(1)}°</span> <small>(MAX:${maxAngles[t.label].toFixed(1)})</small></div>`

ctx.beginPath()
ctx.moveTo(pts[0].x,pts[0].y)
ctx.lineTo(pts[1].x,pts[1].y)
ctx.lineTo(pts[2].x,pts[2].y)

ctx.strokeStyle="#00ff00"
ctx.lineWidth=6
ctx.stroke()

}

})

anglesList.innerHTML=html||"関節検出中..."

}

requestAnimationFrame(detect)

}

function takePhoto(){

const link=document.createElement("a")

link.download="Kotonoha_ROM_"+Date.now()+".png"

link.href=canvas.toDataURL()

link.click()

}

function resetMax(){

maxAngles={}

}

async function init(){

const stream=await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment",
width:1280,
height:720
}

})

video.srcObject=stream

detector=await poseDetection.createDetector(

poseDetection.SupportedModels.MoveNet,

{
modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
}

)

detect()

}

init()

</script>

</body>
</html>
