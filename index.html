<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI & 手動 ROMカメラ</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<style>
body{ font-family:sans-serif; text-align:center; background:#f5f5f5; margin:0; padding:10px; }
#container{ position:relative; width:100%; max-width:640px; margin:0 auto; touch-action: none; }
video{ display:block; width:100%; height:auto; border-radius:10px; background:#000; }
canvas#output_canvas{ position:absolute; top:0; left:0; width:100%; height:100%; border-radius:10px; cursor: crosshair; }
#info-panel { display: flex; justify-content: space-between; max-width: 640px; margin: 10px auto; }
.display-box { flex: 1; background:white; padding:10px; border-radius:8px; margin:0 5px; border:1px solid #ddd; text-align: left; font-size: 14px; }
#manual-angle { color: #d63031; font-weight: bold; font-size: 18px; }
button { padding: 10px 20px; font-size: 16px; border-radius: 8px; border: none; background: #2c7be5; color: white; cursor: pointer; }
</style>
</head>
<body>
<h2>AI & 手動 ROMカメラ</h2>
<div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>
<div id="info-panel">
    <div class="display-box">
        <strong>AI自動計測 (右側):</strong><br>
        肘: <span id="ai_elbow">--</span>°<br>
        膝: <span id="ai_knee">--</span>°<br>
        肩: <span id="ai_shoulder">--</span>°
    </div>
    <div class="display-box">
        <strong>手動タップ計測:</strong><br>
        <span id="manual-angle">3点タップしてください</span><br>
        <button onclick="resetManual()">リセット</button>
    </div>
</div>
<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const aiNodes = { elbow: document.getElementById('ai_elbow'), knee: document.getElementById('ai_knee'), shoulder: document.getElementById('ai_shoulder') };
const manualDisplay = document.getElementById('manual-angle');
let manualPoints = [];
function calculateAngle(A, B, C) {
    const BA = { x: A.x - B.x, y: A.y - B.y };
    const BC = { x: C.x - B.x, y: C.y - B.y };
    const dot = BA.x * BC.x + BA.y * BC.y;
    const magBA = Math.sqrt(BA.x * BA.x + BA.y * BA.y);
    const magBC = Math.sqrt(BC.x * BC.x + BC.y * BC.y);
    if(magBA === 0 || magBC === 0) return 0;
    let angle = Math.acos(dot / (magBA * magBC));
    return (angle * 180 / Math.PI).toFixed(1);
}
canvasElement.addEventListener("pointerdown", function(e) {
    const rect = canvasElement.getBoundingClientRect();
    const scaleX = canvasElement.width / rect.width;
    const scaleY = canvasElement.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    if (manualPoints.length < 3) { manualPoints.push({x, y}); }
    if (manualPoints.length === 3) {
        const angle = calculateAngle(manualPoints[0], manualPoints[1], manualPoints[2]);
        manualDisplay.innerText = "手動角度: " + angle + "°";
    }
});
function resetManual() { manualPoints = []; manualDisplay.innerText = "3点タップしてください"; }
function onResults(results) {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF0055', lineWidth: 2});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00FF00', lineWidth: 1, radius: 3});
        const lm = results.poseLandmarks;
        function get(p){ return { x: p.x * canvasElement.width, y: p.y * canvasElement.height }; }
        try {
            aiNodes.elbow.innerText = calculateAngle(get(lm[12]), get(lm[14]), get(lm[16]));
            aiNodes.knee.innerText = calculateAngle(get(lm[24]), get(lm[26]), get(lm[28]));
            aiNodes.shoulder.innerText = calculateAngle(get(lm[24]), get(lm[12]), get(lm[14]));
        } catch(e) {}
    }
    manualPoints.forEach((p, i) => {
        canvasCtx.fillStyle = "red";
        canvasCtx.beginPath();
        canvasCtx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        canvasCtx.fill();
        canvasCtx.fillStyle = "white";
        canvasCtx.fillText(i+1, p.x-3, p.y+3);
    });
    if(manualPoints.length >= 2) {
        canvasCtx.strokeStyle = "red";
        canvasCtx.lineWidth = 3;
        canvasCtx.beginPath();
        canvasCtx.moveTo(manualPoints[0].x, manualPoints[0].y);
        canvasCtx.lineTo(manualPoints[1].x, manualPoints[1].y);
        if(manualPoints.length === 3) canvasCtx.lineTo(manualPoints[2].x, manualPoints[2].y);
        canvasCtx.stroke();
    }
    canvasCtx.restore();
}
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
pose.onResults(onResults);
const camera = new Camera(videoElement, {
    onFrame: async () => { await pose.send({image: videoElement}); },
    width: 640, height: 480, facingMode: "environment"
});
camera.start();
</script>
</body>
</html>
